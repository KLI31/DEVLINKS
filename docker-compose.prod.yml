services:
  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: devlinks-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devlinks-net

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: devlinks-redis
    restart: always
    expose:
      - "6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devlinks-net

  # ── Backend NestJS ─────────────────────────────────────────
  backend:
    build:
      context: ./devlinks-backend
      dockerfile: Dockerfile.prod
    container_name: devlinks-backend
    restart: always
    expose:
      - "3001"
    env_file:
      - ./devlinks-backend/.env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - devlinks-net

  # ── Frontend Next.js ───────────────────────────────────────
  frontend:
    build:
      context: ./devlinks-frontend
      dockerfile: Dockerfile.prod
    container_name: devlinks-frontend
    restart: always
    expose:
      - "3000"
    env_file:
      - ./devlinks-frontend/.env.prod
    depends_on:
      - backend
    networks:
      - devlinks-net

  # ── Nginx + SSL ────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: devlinks-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    networks:
      - devlinks-net

# ── Volúmenes ──────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:

# ── Red interna ────────────────────────────────────────────
networks:
  devlinks-net:
    driver: bridge
