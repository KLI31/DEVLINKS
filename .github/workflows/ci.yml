name: deploy-services

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # BACKEND — NestJS 11 · Prisma · PostgreSQL 16 · Redis 7
  # ─────────────────────────────────────────────────────────────────────
  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: devlinks
          POSTGRES_PASSWORD: devlinks
          POSTGRES_DB: devlinks_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: devlinks-backend

    env:
      DATABASE_URL: postgresql://devlinks:devlinks@localhost:5432/devlinks_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-jwt-secret-minimum-length-32-chars!
      ENCRYPTION_KEY: ci-encryption-key-32-chars-exactly!
      NODE_ENV: test
      PORT: "3001"
      FRONTEND_URL: http://localhost:3000
      GITHUB_CLIENT_ID: ci-dummy-github-client-id
      GITHUB_CLIENT_SECRET: ci-dummy-github-client-secret
      GITHUB_CALLBACK_URL: http://localhost:3001/auth/github/callback

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: devlinks-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Unit tests with coverage
        run: npm run test:cov

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          directory: devlinks-backend/coverage
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: E2E tests
        run: npm run test:e2e

      - name: Build check
        run: npm run build

  # ─────────────────────────────────────────────────────────────────────
  # FRONTEND — Next.js 16 · React 19 · Tailwind v4
  # ─────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: devlinks-frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: devlinks-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost/api
          NEXT_PUBLIC_APP_URL: http://localhost
        run: npm run build

  # ─────────────────────────────────────────────────────────────────────
  # DEPLOY — Dokploy construye desde GitHub (sin GHCR ni registry)
  # Solo se dispara en push a main después de que pasen los tests.
  # Requisitos en GitHub → Settings → Secrets (environment: production):
  #   DOKPLOY_HOST   → hostname de tu instancia Dokploy (sin https://)
  #   DOKPLOY_TOKEN  → API token de Dokploy (Settings → API)
  #   DOKPLOY_APP_ID → Application ID del backend en Dokploy
  # Prisma migrations: configura "npx prisma migrate deploy" como
  # Pre Deploy Command en la app de Dokploy (Build → Pre Deploy Command).
  # ─────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy Backend to Dokploy
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Trigger Dokploy build & deploy
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://${{ secrets.DOKPLOY_HOST }}/api/application.deploy" \
            -H "x-dokploy-token: ${{ secrets.DOKPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"applicationId":"${{ secrets.DOKPLOY_APP_ID }}"}')

          echo "Dokploy response: $STATUS"
          [ "$STATUS" = "200" ] || [ "$STATUS" = "201" ] || \
            { echo "Dokploy deploy failed (HTTP $STATUS)"; exit 1; }

          echo "Build queued in Dokploy — commit ${{ github.sha }}"
